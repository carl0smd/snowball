<div
  class="min-h-screen bg-zinc-50 dark:bg-zinc-950 text-zinc-800 dark:text-zinc-100 flex flex-col font-sans transition-all-300"
  *transloco="let t"
>
  <app-header
    [currentLang]="currentLang()"
    [darkMode]="darkMode()"
    [currentCurrency]="currency()"
    (toggleLanguage)="toggleLanguage()"
    (toggleTheme)="toggleTheme()"
    (toggleCurrency)="toggleCurrency()"
  >
  </app-header>

  <main class="grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex flex-col gap-6">
    <!-- TAB NAVIGATION -->
    <div class="flex justify-center">
      <div
        class="bg-zinc-200/60 dark:bg-zinc-900/60 p-1 rounded-xl flex gap-1 border border-zinc-200/30 dark:border-zinc-800/30 backdrop-blur"
      >
        <button
          (click)="activeTab.set('compound')"
          [class]="
            activeTab() === 'compound'
              ? 'bg-white dark:bg-zinc-800 text-violet-600 dark:text-violet-400 shadow-sm'
              : 'text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200'
          "
          class="px-5 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-all-300"
        >
          {{ t('nav.compound') }}
        </button>
        <button
          (click)="activeTab.set('fire')"
          [class]="
            activeTab() === 'fire'
              ? 'bg-white dark:bg-zinc-800 text-violet-600 dark:text-violet-400 shadow-sm'
              : 'text-zinc-500 hover:text-zinc-800 dark:hover:text-zinc-200'
          "
          class="px-5 py-2 rounded-lg text-sm font-semibold cursor-pointer transition-all-300"
        >
          {{ t('nav.fire') }}
        </button>
      </div>
    </div>

    <!-- MAIN TWO COLUMN GRID -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- LEFT COLUMN: CONTROL PANEL (1/3) -->
      <app-control-panel
        [initialCapital]="initialCapital()"
        [monthlyContribution]="monthlyContribution()"
        [annualReturn]="annualReturn()"
        [years]="years()"
        [inflation]="inflation()"
        [monthlyExpenses]="monthlyExpenses()"
        [riskProfile]="riskProfile()"
        [activeTab]="activeTab()"
        [currency]="currency()"
        [currentLang]="currentLang()"
        (initialCapitalChange)="initialCapital.set($event)"
        (monthlyContributionChange)="monthlyContribution.set($event)"
        (annualReturnChange)="onReturnChange($event)"
        (yearsChange)="years.set($event)"
        (inflationChange)="inflation.set($event)"
        (monthlyExpensesChange)="monthlyExpenses.set($event)"
        (riskProfileSelect)="selectRiskProfile($event)"
        (riskProfileDeselect)="deselectRiskProfile()"
        (resetSettings)="resetSettings()"
        (exportSettings)="exportToJson()"
        (importSettings)="importFromJson($event)"
      >
      </app-control-panel>

      <!-- RIGHT COLUMN: VISUAL DASHBOARD OUTPUTS (2/3) -->
      <section id="results-section" class="lg:col-span-2 flex flex-col gap-6">
        <!-- KPI CARDS GRID -->
        <app-kpi-cards
          [nominalBalance]="nominalBalance()"
          [realBalance]="realBalance()"
          [totalContributed]="totalContributed()"
          [nominalInterests]="nominalInterests()"
          [currency]="currency()"
          [currentLang]="currentLang()"
        >
        </app-kpi-cards>

        <!-- TAB 1: COMPOUND INTEREST VISUALS -->
        <div [class.hidden]="activeTab() !== 'compound'">
          <app-growth-tab
            [results]="simulationResults()"
            [scenarios]="scenariosResults()"
            [allocation]="riskAllocation()"
            [annualReturn]="annualReturn()"
            [riskProfile]="riskProfile()"
            [chartMode]="chartMode()"
            [darkMode]="darkMode()"
            [currentLang]="currentLang()"
            [currency]="currency()"
            (chartModeChange)="chartMode.set($event)"
          >
          </app-growth-tab>
        </div>

        <!-- TAB 2: F.I.R.E. DETAILED CALCULATOR -->
        <div [class.hidden]="activeTab() !== 'fire'">
          <app-fire-tab 
            [fireStatus]="fireStatus()" 
            [monthlyExpenses]="monthlyExpenses()"
            [currency]="currency()"
            [currentLang]="currentLang()"
          >
          </app-fire-tab>
        </div>
      </section>
    </div>
  </main>

  <!-- FLOATING ACTION BUTTON (Mobile scroll assistant) -->
  <button
    (click)="toggleScroll()"
    class="fixed bottom-6 right-6 z-40 lg:hidden flex items-center gap-2 px-4.5 py-3.5 rounded-full bg-violet-600/95 dark:bg-violet-500/95 text-white font-black text-xs shadow-2xl border border-violet-500/30 cursor-pointer active:scale-95 hover:scale-105 active:bg-violet-700 hover:bg-violet-500 hover:shadow-violet-500/20 transition-all duration-300"
  >
    @if (isScrolledDown()) {
      <!-- Up Arrow Icon -->
      <svg class="h-4.5 w-4.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7" />
      </svg>
      <span>{{ t('dashboard.mobile.scrollToInputs') }}</span>
    } @else {
      <!-- Down Arrow Icon -->
      <svg class="h-4.5 w-4.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
      <span>{{ t('dashboard.mobile.scrollToResults') }}</span>
    }
  </button>
</div>
