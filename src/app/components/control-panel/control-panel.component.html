<section *transloco="let t" class="lg:col-span-1 flex flex-col gap-5 bg-white dark:bg-zinc-900/40 p-6 rounded-2xl border border-zinc-200/50 dark:border-zinc-800/50 backdrop-blur-md shadow-sm transition-all-300">
  
  <div class="flex items-center justify-between border-b border-zinc-200/50 dark:border-zinc-800/50 pb-3">
    <h2 class="font-display font-bold text-lg text-zinc-900 dark:text-zinc-100 flex items-center gap-2">
      <svg class="h-5 w-5 text-violet-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
      </svg>
      {{ t('inputs.title') }}
    </h2>
    <button (click)="resetSettings.emit()" 
            class="p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-400 hover:text-violet-500 cursor-pointer transition-all-300"
            [title]="t('inputs.reset')"
            [attr.aria-label]="t('inputs.reset')">
      <svg class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
    </button>
  </div>
 
  <!-- Info Tooltip Alert -->
  <div class="flex items-start gap-2 bg-violet-500/5 dark:bg-violet-500/10 p-3 rounded-xl border border-violet-500/10 text-[11px] text-zinc-600 dark:text-zinc-300">
    <svg class="h-4.5 w-4.5 text-violet-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <p class="leading-normal">
      {{ t('inputs.infoTooltip') }}
    </p>
  </div>

  <!-- INPUT SLIDERS & RISK PROFILES -->
  <div class="flex flex-col gap-4">
    
    <!-- Capital Inicial -->
    <app-slider-input
      [label]="t('inputs.initialCapital')"
      [displayValue]="formatCurrency(initialCapital(), currency(), currentLang())"
      [value]="initialCapital()"
      [min]="0"
      [max]="500000"
      [step]="1000"
      [minLabel]="formatCurrencyLabel(0)"
      [midLabel]="formatCurrencyLabel(250000)"
      [maxLabel]="formatCurrencyLabel(500000)"
      (valueChange)="initialCapitalChange.emit($event)"
    ></app-slider-input>

    <!-- Ahorro Mensual -->
    <app-slider-input
      [label]="t('inputs.monthlyContribution')"
      [displayValue]="formatCurrency(monthlyContribution(), currency(), currentLang()) + '/' + t('dashboard.monthLabel')"
      [value]="monthlyContribution()"
      [min]="0"
      [max]="5000"
      [step]="50"
      [minLabel]="formatCurrencyLabel(0)"
      [midLabel]="formatCurrencyLabel(2500)"
      [maxLabel]="formatCurrencyLabel(5000)"
      (valueChange)="monthlyContributionChange.emit($event)"
    ></app-slider-input>

    <!-- Rentabilidad Anual -->
    <app-slider-input
      [label]="t('inputs.annualReturn')"
      [displayValue]="annualReturn() + '%'"
      [value]="annualReturn()"
      [min]="0.5"
      [max]="20"
      [step]="0.5"
      minLabel="0.5%"
      midLabel="10%"
      maxLabel="20%"
      (valueChange)="annualReturnChange.emit($event)"
    ></app-slider-input>

    <!-- Años (Only active in Compound Interest tab) -->
    @if (activeTab() === 'compound') {
      <app-slider-input
        [label]="t('inputs.years')"
        [displayValue]="years() + ' ' + t('inputs.yearsUnit')"
        [value]="years()"
        [min]="1"
        [max]="50"
        [step]="1"
        [minLabel]="'1 ' + (t('dashboard.year') | lowercase)"
        midLabel="25"
        maxLabel="50"
        (valueChange)="yearsChange.emit($event)"
      ></app-slider-input>
    }

    <!-- Inflación -->
    <app-slider-input
      [label]="t('inputs.inflation')"
      [displayValue]="inflation() + '%'"
      [value]="inflation()"
      [min]="0"
      [max]="10"
      [step]="0.5"
      minLabel="0%"
      midLabel="5%"
      maxLabel="10%"
      (valueChange)="inflationChange.emit($event)"
    ></app-slider-input>

    <!-- FIRE Specific input (Active only in FIRE tab) -->
    @if (activeTab() === 'fire') {
      <div class="pt-2 border-t border-zinc-200/50 dark:border-zinc-800/50 transition-all-300">
        <app-slider-input
          [label]="t('inputs.monthlyExpenses')"
          [displayValue]="formatCurrency(monthlyExpenses(), currency(), currentLang())"
          [value]="monthlyExpenses()"
          [min]="0"
          [max]="8000"
          [step]="100"
          [minLabel]="formatCurrencyLabel(0)"
          [midLabel]="formatCurrencyLabel(4000)"
          [maxLabel]="formatCurrencyLabel(8000)"
          (valueChange)="monthlyExpensesChange.emit($event)"
        ></app-slider-input>
      </div>
    }

    <!-- Perfil de riesgo de cartera -->
    @if (activeTab() === 'compound') {
      <div class="flex flex-col gap-2 pt-2 border-t border-zinc-200/50 dark:border-zinc-800/50 transition-all-300">
        <div class="flex items-center justify-between">
          <label class="text-xs font-bold text-zinc-600 dark:text-zinc-300 uppercase tracking-wider">{{ t('inputs.riskProfile') }}</label>
          @if (riskProfile()) {
            <button (click)="riskProfileDeselect.emit()" 
                    class="text-[10px] font-bold text-zinc-500 dark:text-zinc-400 hover:text-violet-500 dark:hover:text-violet-400 cursor-pointer transition-all-300 flex items-center gap-1 bg-transparent border-0 p-0">
              <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
              {{ t('inputs.riskDeselect') }}
            </button>
          }
        </div>
        <div class="grid grid-cols-2 gap-2">
          @for (profile of riskProfiles; track profile.id) {
            <button (click)="riskProfileSelect.emit(profile.id)"
                    [class]="riskProfile() === profile.id
                              ? 'bg-zinc-100 dark:bg-zinc-800 text-violet-600 dark:text-violet-400 ring-2 ring-violet-500/30 font-bold border-violet-500/50'
                              : 'border-zinc-200 dark:border-zinc-800 text-zinc-600 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-900/30'"
                    class="px-2 py-2 border rounded-lg text-xs font-semibold transition-all-300 cursor-pointer">
              {{ t(profile.labelKey) }}
            </button>
          }
        </div>
      </div>
    }

  </div>

  <!-- EXPORT / IMPORT ACTIONS -->
  <div class="grid grid-cols-2 gap-3 mt-2 pt-4 border-t border-zinc-200/50 dark:border-zinc-800/50">
    <button (click)="exportSettings.emit()" 
            class="flex items-center justify-center gap-1.5 px-3 py-2 text-xs font-bold border border-zinc-200 dark:border-zinc-800 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-600 dark:text-zinc-300 cursor-pointer transition-all-300">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      {{ t('dashboard.export') }}
    </button>
    
    <label class="flex items-center justify-center gap-1.5 px-3 py-2 text-xs font-bold border border-zinc-200 dark:border-zinc-800 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-600 dark:text-zinc-300 cursor-pointer transition-all-300">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
      </svg>
      {{ t('dashboard.import') }}
      <input type="file" (change)="importSettings.emit($event)" accept=".json" class="hidden">
    </label>
  </div>

</section>
