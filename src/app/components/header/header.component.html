<header
  *transloco="let t"
  class="border-b border-zinc-200/60 dark:border-zinc-800/60 backdrop-blur-md bg-white/70 dark:bg-zinc-900/70 sticky top-0 z-30 transition-all-300"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <!-- App Brand -->
    <div class="flex items-center gap-3">
      <div
        class="h-9 w-9 rounded-xl bg-linear-to-tr from-violet-600 to-fuchsia-600 flex items-center justify-center shadow-lg shadow-violet-500/20"
      >
        <svg
          class="h-5 w-5 text-white"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
      </div>
      <div>
        <h1
          class="font-display font-extrabold text-xl bg-linear-to-r from-violet-600 via-fuchsia-600 to-indigo-600 dark:from-violet-400 dark:via-fuchsia-400 dark:to-indigo-400 bg-clip-text text-transparent leading-none"
        >
          {{ t('title') }}
        </h1>
        <p class="text-xs text-zinc-500 dark:text-zinc-400 font-medium">
          {{ t('subtitle') }}
        </p>
      </div>
    </div>

    <!-- App Control Center -->
    <div class="flex items-center gap-3">
      <!-- Privacy Badge (Desktop) -->
      <span
        class="hidden md:flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-100/50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200/50 dark:border-emerald-900/50 transition-all-300"
      >
        <svg
          class="h-3.5 w-3.5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
          />
        </svg>
        {{ t('meta.privacy') }}
      </span>

      <!-- Language Selector -->
      <button
        (click)="toggleLanguage.emit()"
        class="px-2.5 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800 text-xs font-bold hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition-all-300"
      >
        {{ currentLang() === 'es' ? 'EN' : 'ES' }}
      </button>

      <!-- Theme Toggle -->
      <button
        (click)="toggleTheme.emit()"
        class="p-2 rounded-lg border border-zinc-200 dark:border-zinc-800 text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition-all-300"
      >
        @if (darkMode()) {
          <svg
            class="h-4.5 w-4.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M6.343 6.343l.707-.707m2.828 9.9a5 5 0 117.072 0l-.066.066a5.003 5.003 0 00-7.072 0z"
            />
          </svg>
        } @else {
          <svg
            class="h-4.5 w-4.5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        }
      </button>
    </div>
  </div>
</header>
