<header
  *transloco="let t"
  class="border-b border-zinc-200/60 dark:border-zinc-800/60 backdrop-blur-md bg-white/70 dark:bg-zinc-900/70 transition-all-300"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
    <!-- App Brand -->
    <div class="flex items-center gap-3">
      <div
        class="h-9 w-9 rounded-lg bg-zinc-900 dark:bg-white flex items-center justify-center transition-all-300 shadow-xs"
      >
        <svg
          class="h-5 w-5 text-white dark:text-zinc-900"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <!-- Symmetrical stack of 3 snowballs with soft semi-transparent glass fill -->
          <circle cx="7.5" cy="15.5" r="4.2" fill="currentColor" fill-opacity="0.15" />
          <circle cx="16.5" cy="15.5" r="4.2" fill="currentColor" fill-opacity="0.15" />
          <circle cx="12" cy="9" r="4.2" fill="currentColor" fill-opacity="0.15" />
        </svg>
      </div>
      <div>
        <h1
          class="font-display font-black text-xl text-zinc-900 dark:text-white tracking-tight leading-none"
        >
          {{ t('title') }}<span class="text-violet-500 font-extrabold">.</span>
        </h1>
        <p class="text-[9px] uppercase tracking-wider text-zinc-400 dark:text-zinc-500 font-bold mt-1.5 leading-none">
          {{ t('subtitle') }}
        </p>
      </div>
    </div>

    <!-- App Control Center -->
    <div class="flex items-center gap-3">
      <!-- Privacy Badge (Desktop) -->
      <span
        class="hidden md:flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-100/50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 border border-emerald-200/50 dark:border-emerald-900/50 transition-all-300"
      >
        <svg
          class="h-3.5 w-3.5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
          />
        </svg>
        {{ t('meta.privacy') }}
      </span>

      <!-- Currency Selector -->
      <button
        (click)="toggleCurrency.emit()"
        class="h-8 px-3 rounded-lg border border-zinc-200 dark:border-zinc-800 text-xs font-bold hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition-all-300 flex items-center justify-center"
        [title]="currentCurrency() === 'EUR' ? 'Cambiar a Dólar (USD)' : 'Cambiar a Euro (EUR)'"
      >
        {{ currentCurrency() === 'EUR' ? '€ (EUR)' : '$ (USD)' }}
      </button>

      <!-- Language Selector -->
      <button
        (click)="toggleLanguage.emit()"
        class="h-8 px-3 rounded-lg border border-zinc-200 dark:border-zinc-800 text-xs font-bold hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition-all-300 flex items-center justify-center"
      >
        {{ currentLang() === 'es' ? 'EN' : 'ES' }}
      </button>

      <!-- Theme Toggle -->
      <button
        (click)="toggleTheme.emit()"
        class="h-8 w-8 rounded-lg border border-zinc-200 dark:border-zinc-800 text-zinc-500 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-900 cursor-pointer transition-all-300 flex items-center justify-center"
      >
        @if (darkMode()) {
          <svg
            class="h-4.5 w-4.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2" />
            <path d="M12 20v2" />
            <path d="m4.93 4.93 1.41 1.41" />
            <path d="m17.66 17.66 1.41 1.41" />
            <path d="M2 12h2" />
            <path d="M20 12h2" />
            <path d="m6.34 17.66-1.41 1.41" />
            <path d="m19.07 4.93-1.41 1.41" />
          </svg>
        } @else {
          <svg
            class="h-4.5 w-4.5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
          </svg>
        }
      </button>
    </div>
  </div>
</header>
