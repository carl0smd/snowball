<div class="flex flex-col gap-1.5">
  <div class="flex items-center justify-between">
    <label class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">{{ label() }}</label>
    <span class="text-sm font-mono font-bold text-violet-600 dark:text-violet-400 bg-violet-50 dark:bg-violet-950/40 px-2 py-0.5 rounded border border-violet-100/50 dark:border-violet-900/30">
      {{ displayValue() }}
    </span>
  </div>
  <input type="range" 
         [min]="min()" 
         [max]="max()" 
         [step]="step()" 
         [ngModel]="value()" 
         (ngModelChange)="valueChange.emit($event)">
  <div class="flex justify-between text-[9px] text-zinc-400 dark:text-zinc-500 font-semibold px-0.5 leading-none">
    <span>{{ minLabel() }}</span>
    <span>{{ midLabel() }}</span>
    <span>{{ maxLabel() }}</span>
  </div>
</div>
